schema_version: "1.0"

# Identification
job_id: ""                  # unique, e.g. "relay-crypto-001" or uuid
parent_job_id: ""           # parent job id if this is a child job; "" for root

# Hierarchy level
level: ""                   # orchestrator | repo | domain
target:
  repo: ""                  # e.g. "CIC-Relay"
  path: ""                  # e.g. "core/nexus/crypto"; required at domain level

# KB context
kb_focus: []                # focus_pack node-ids or tags, e.g. ["crypto", "vault"]
promptmap_ref: ""           # key in ai/PROMPTMAP.yaml; "" if not applicable

# Agent
agent:
  config_dir: ""            # CLAUDE_CONFIG_DIR value, e.g. "~/.claude-personal/agents/agent-01"
  model: ""                 # e.g. "claude-sonnet-4-6"
  session_id: ""            # optional; Claude Code session UUID, set by run-job.sh after each run.
                             # Used by `run-job.sh <job-id> <agent-id> --resume` to continue
                             # exactly where a session-limit/error cutoff happened.

# Workplace — agent saját klónjában, nem a live workdir-ban
# Clone helye: ~/.claude-personal/agents/<id>/workspace/<job-id>/
workplace:
  repos: []                 # klónozandó repók, pl. ["cic-factory", "github_private"]
  branch: ""                # feature branch neve, pl. "feature/kb-repos"

# Status
status: "pending"           # pending | running | done | error
error_message: ""           # only when status: error

# Timestamps (ISO 8601)
timestamps:
  created: ""
  started: ""
  completed: ""
