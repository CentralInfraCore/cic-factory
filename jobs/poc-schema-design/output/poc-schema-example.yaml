metadata:
  name: cic-relay-config
  version: v0.1.0_poc
  description: "Schema for CIC-Relay runtime configuration. Defines the relay instance
    identity, trust level, and module set. Used by the relay to self-validate its
    configuration and by the management plane to verify relay identity."
  owner: Gabor Zoltan Sinko
  tags:
    - relay
    - config
    - poc
  validatedBy:
    name: template-schema
    version: v0.9.5_2025
    checksum: <TEMPLATE_SCHEMA_CHECKSUM>
  checksum: <SPEC_SHA256>
  sign: vault:v1:<RELAY_SIGN>
  build_timestamp: "2026-06-08T00:00:00Z"
  createdBy:
    name: Gabor Zoltan Sinko
    email: sinkog@centralinfracore.hu
    certificate: |
      -----BEGIN CERTIFICATE-----
      <CREATOR_CERT_PEM>
      -----END CERTIFICATE-----
    issuer_certificate: |
      -----BEGIN CERTIFICATE-----
      <CIC_DEVELOPER_CA_PEM>
      -----END CERTIFICATE-----

spec:
  type: object
  required:
    - relay_id
    - version
    - trust_level
  properties:
    relay_id:
      type: string
      description: "Unique relay instance identifier"
    version:
      type: string
      pattern: "^v[0-9]+\\.[0-9]+"
      description: "Relay software version — semver with v prefix"
    trust_level:
      type: string
      enum:
        - L0
        - L1
        - L2
        - L3
        - L4
        - L5
        - L6
        - L7
      description: "Trust level per the CIC L0-L7 relay trust model"
    modules:
      type: array
      items:
        type: string
      description: "List of enabled module IDs (e.g. postgresql@v0.18.0_2025)"

cic_countersign:
  authority:
    name: CIC Source CA
    certificate: |
      -----BEGIN CERTIFICATE-----
      <CIC_SOURCE_CA_CERT_PEM>
      -----END CERTIFICATE-----
    root_certificate: |
      -----BEGIN CERTIFICATE-----
      <CIC_ROOT_CA_PEM>
      -----END CERTIFICATE-----
  signed_payload: metadata_sha256
  sign: vault:v1:<COUNTERSIGN>
